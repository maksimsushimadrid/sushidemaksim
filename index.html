<!doctype html>
<html lang="es">
    <head>
        <script>
            // --- IMMEDIATE THEME SETUP ---
            // Fix white flash on refresh by setting background color immediately
            (function () {
                // --- CANONICAL REDIRECT ---
                const host = window.location.hostname;
                const isProduction = host !== 'localhost' && !host.includes('vercel.app');
                if (isProduction && host === 'sushidemaksim.com') {
                    window.location.replace(
                        'https://www.sushidemaksim.com' +
                            window.location.pathname +
                            window.location.search +
                            window.location.hash
                    );
                    return;
                }

                const isTable = window.location.pathname.startsWith('/table');
                const isDark = isTable;
                const bgColor = isDark ? '#0d0d0d' : '#fbf7f0';
                const themeColor = isDark ? '#000000' : '#ea580c';

                document.documentElement.style.backgroundColor = bgColor;
                if (isDark) {
                    document.documentElement.style.colorScheme = 'dark';
                    document.documentElement.classList.add('is-table-route');
                }

                // Update theme-color meta tag if it exists
                document.addEventListener('DOMContentLoaded', function () {
                    const meta = document.querySelector('meta[name="theme-color"]');
                    if (meta) meta.setAttribute('content', themeColor);
                });
            })();
        </script>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
        />

        <!-- Preconnect to external domains -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="preconnect" href="https://lmuytpvktanykcubpodh.supabase.co" />
        <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
        <link rel="dns-prefetch" href="https://lmuytpvktanykcubpodh.supabase.co" />

        <!-- Preload critical LCP assets -->
        <link
            rel="preload"
            href="/hero-poster.webp"
            as="image"
            fetchpriority="high"
            imagesrcset="/hero-poster-mobile.webp 768w, /hero-poster.webp 1920w"
            imagesizes="(max-width: 768px) 768px, 1920px"
        />

        <!-- SEO -->
        <title>Sushi de Maksim — Auténtica cocina japonesa</title>
        <meta name="description" content="Sushi fresco con entrega a domicilio en Madrid." />
        <meta name="robots" content="index, follow" />
        <meta
            name="google-site-verification"
            content="mcjUQOB7lhnf7X2NHN6M9EcMNSDLF9-8DvBYjGlc-k4"
        />

        <meta property="og:title" content="Sushi de Maksim — Cocina japonesa" />
        <meta property="og:url" content="https://www.sushidemaksim.com" />
        <meta
            property="og:description"
            content="Sushi y rollos frescos con entrega a domicilio en Madrid. Pide online."
        />
        <meta property="og:image" content="https://www.sushidemaksim.com/og-image-v20.jpg" />
        <meta
            property="og:image:secure_url"
            content="https://www.sushidemaksim.com/og-image-v20.jpg"
        />
        <meta property="og:image:width" content="1200" />
        <meta property="og:image:height" content="630" />
        <meta property="og:image:type" content="image/jpeg" />
        <meta property="og:locale" content="es_ES" />

        <meta property="og:site_name" content="Sushi de Maksim" />

        <!-- Twitter Card -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:title" content="Sushi de Maksim" />
        <meta
            name="twitter:description"
            content="Auténtica cocina japonesa con entrega a domicilio."
        />
        <meta name="twitter:image" content="https://www.sushidemaksim.com/og-image-v20.jpg" />

        <!-- Theme -->
        <meta name="theme-color" content="#ea580c" />

        <style>
            /* Initial critical CSS to support the script above */
            html {
                background-color: #fbf7f0; /* Default beige for main site */
            }
            html.is-table-route {
                background-color: #0d0d0d !important;
                color-scheme: dark;
            }
            body {
                margin: 0;
                padding: 0;
                background-color: inherit;
            }
            #root:empty {
                min-height: 100vh;
                background-color: inherit;
            }
        </style>
    </head>
